services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/user/migrations:/migrations/user
      - ./services/product/migrations:/migrations/product
      - ./services/order/migrations:/migrations/order
      - ./services/payment/migrations:/migrations/payment
      - ./scripts/migrate.sh:/migrate.sh
    entrypoint: ["sh", "/migrate.sh"]

  user-service:
    build:
      context: .
      args:
        SERVICE_NAME: user
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable
      PORT: "8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  product-service:
    build:
      context: .
      args:
        SERVICE_NAME: product
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/product_db?sslmode=disable
      PORT: "8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  order-service:
    build:
      context: .
      args:
        SERVICE_NAME: order
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/order_db?sslmode=disable
      PORT: "8080"
      PRODUCT_SERVICE_URL: http://product-service:8080
      USER_SERVICE_URL: http://user-service:8080
    depends_on:
      migrate:
        condition: service_completed_successfully

  payment-service:
    build:
      context: .
      args:
        SERVICE_NAME: payment
    ports:
      - "8083:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/payment_db?sslmode=disable
      PORT: "8080"
      ORDER_SERVICE_URL: http://order-service:8080
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
